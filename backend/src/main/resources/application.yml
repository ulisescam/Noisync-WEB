server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:"CAMBIA_ESTE_SECRETO_SUPER_LARGO_DE_32+_CHARS"}
    access-token-minutes: 15
    refresh-token-days: 7
  security:
    lock-minutes: 10
  frontend:
    verify-url: "https://TU-APP.netlify.app/verify-email?token="

spring:
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@noizync679_high
    username: ADMIN
    password: ${ORACLE_PASSWORD}
    hikari:
      connection-init-sql: "ALTER SESSION SET TIME_ZONE='America/Mexico_City'"

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ADMIN
        jdbc:
          time_zone: America/Mexico_City

  mail:
    host: smtp.gmail.com
    port: 587
    username: "noisyncsystem@gmail.com"
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

logging:
  level:
    org.springframework.mail: DEBUG
    com.sun.mail: DEBUG